name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write

jobs:
  linux:
    uses: ./.github/workflows/linux.yml

  windows:
    uses: ./.github/workflows/windows.yml

  appimage:
    uses: ./.github/workflows/appimage.yml

  flatpak:
    uses: ./.github/workflows/flatpak.yml

  release:
    name: Draft release
    needs: [linux, windows, appimage, flatpak]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package artifacts
        run: |
          cd artifacts

          # Linux tarball
          tar czf neoradiant-linux-x86_64.tar.gz -C neoradiant-linux-x86_64 .

          # Windows zip
          cd neoradiant-windows-x64
          zip -r ../neoradiant-windows-x64.zip .
          cd ..

          # AppImage is already a single file
          cp neoradiant-appimage-x86_64/*.AppImage .

          # Flatpak is already a single file
          cp neoradiant-flatpak-x86_64/neoradiant.flatpak .

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/neoradiant-linux-x86_64.tar.gz
            artifacts/neoradiant-windows-x64.zip
            artifacts/*.AppImage
            artifacts/neoradiant.flatpak
