name: AppImage

on:
  push:
    branches: ['**']
  pull_request:
  workflow_call:

concurrency:
  group: appimage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: AppImage x86_64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository -y ppa:sjr/wx32
          sudo apt-get update
          sudo apt-get install -yq --no-install-recommends \
            build-essential cmake pkg-config gettext \
            libxml2-dev libsigc++-2.0-dev \
            libeigen3-dev libwxgtk3.2-dev \
            libftgl-dev libglew-dev libalut-dev \
            libgit2-dev libglib2.0-dev libgtk-3-dev \
            libfuse2

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=/usr
          -DENABLE_RELOCATION=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Create AppDir
        run: |
          DESTDIR=${{ github.workspace }}/AppDir cmake --build build --target install

          # Desktop file needs a relative Exec path for AppImage
          sed -i 's|Exec=.*/neoradiant.*|Exec=neoradiant|' \
            AppDir/usr/share/applications/io.github.friskthefallenhuman.neoradiant.desktop

          PYVER=$(python3 -c 'import sys;print(f"{sys.version_info.major}.{sys.version_info.minor}")')
          mkdir -p AppDir/usr/lib/python${PYVER}
          cp -a /usr/lib/python${PYVER}/. AppDir/usr/lib/python${PYVER}/
          rm -rf AppDir/usr/lib/python${PYVER}/test \
                 AppDir/usr/lib/python${PYVER}/config-${PYVER}-x86_64-linux-gnu \
                 AppDir/usr/lib/python${PYVER}/__pycache__ \
                 AppDir/usr/lib/python${PYVER}/*/__pycache__
          find AppDir/usr/lib/python${PYVER} -name __pycache__ -type d -exec rm -rf {} +

      - name: Build AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          export LD_LIBRARY_PATH="${{ github.workspace }}/AppDir/usr/lib/x86_64-linux-gnu/darkradiant:${LD_LIBRARY_PATH:-}"

          cat > AppRun <<'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${HERE}/usr/lib/x86_64-linux-gnu:${HERE}/usr/lib/x86_64-linux-gnu/darkradiant:${LD_LIBRARY_PATH}"
          export PYTHONHOME="${HERE}/usr"
          unset PYTHONPATH
          exec "${HERE}/usr/bin/darkradiant" "$@"
          EOF
          chmod +x AppRun

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --custom-apprun "$(pwd)/AppRun" \
            --desktop-file AppDir/usr/share/applications/net.darkradiant.DarkRadiant.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/128x128/apps/net.darkradiant.DarkRadiant.png \
            --exclude-library='libmath.so' \
            --exclude-library='libscene.so' \
            --exclude-library='libwxutil.so' \
            --exclude-library='libxmlutil.so' \
            --deploy-deps-only=AppDir/usr/lib/x86_64-linux-gnu/darkradiant/modules \
            --deploy-deps-only=AppDir/usr/lib/x86_64-linux-gnu/darkradiant/plugins \
            --output appimage

          rm linuxdeploy-x86_64.AppImage AppRun

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neoradiant-appimage-x86_64
          path: "*.AppImage"
